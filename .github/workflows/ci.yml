name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo lint

      - name: Build workspace
        run: cargo build --workspace --release

  msrv:
    name: MSRV (1.87)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned MSRV toolchain
        uses: dtolnay/rust-toolchain@1.87.0

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Check workspace builds on the declared MSRV
        run: cargo check --workspace --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Start Docker Compose
        run: docker compose -f docker/docker-compose.yml up -d
        continue-on-error: true

      - name: Wait for services
        run: sleep 10

      - name: Build release binaries
        run: cargo build --workspace --release

      - name: Run E2E tests
        run: |
          if [ -f ./scripts/e2e-test.sh ]; then
            chmod +x ./scripts/e2e-test.sh
            ./scripts/e2e-test.sh
          else
            echo "E2E test script not yet implemented"
          fi

      - name: Stop Docker Compose
        if: always()
        run: docker compose -f docker/docker-compose.yml down
        continue-on-error: true

  # Supply-chain audit: licenses, banned crates, sources, and advisories.
  # Runs as a real gate on every push and pull request (no continue-on-error).
  # Known-unfixable transitive advisories are waived explicitly in deny.toml.
  audit:
    name: Supply-chain Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-deny (pinned)
        run: cargo install cargo-deny --version 0.20.2 --locked

      - name: Run cargo-deny (all sections)
        run: cargo deny check
