name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo lint

      - name: Build workspace
        run: cargo build --workspace --release

  msrv:
    name: MSRV (1.87)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned MSRV toolchain
        uses: dtolnay/rust-toolchain@1.87.0

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Check workspace builds on the declared MSRV
        run: cargo check --workspace --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Start Docker Compose
        run: docker compose -f docker/docker-compose.yml up -d
        continue-on-error: true

      - name: Wait for services
        run: sleep 10

      - name: Build release binaries
        run: cargo build --workspace --release

      - name: Run E2E tests
        run: |
          if [ -f ./scripts/e2e-test.sh ]; then
            chmod +x ./scripts/e2e-test.sh
            ./scripts/e2e-test.sh
          else
            echo "E2E test script not yet implemented"
          fi

      - name: Stop Docker Compose
        if: always()
        run: docker compose -f docker/docker-compose.yml down
        continue-on-error: true

  # Timing-sensitive filesystem-watcher integration tests have flaked in the
  # past (debouncer does not deliver a 1:1 action->event mapping). Run them
  # repeatedly so a re-introduced race fails CI instead of reaching main.
  flaky-guard:
    name: Flaky Guard (watcher integration x5)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build integration tests once
        run: cargo test -p e2e-tests --test file_watcher --test vault_sync --no-run

      - name: Run watcher integration tests 5x
        run: |
          for i in $(seq 1 5); do
            echo "=== iteration $i ==="
            cargo test -p e2e-tests --test file_watcher --test vault_sync || exit 1
          done

  # Supply-chain audit: licenses, banned crates, sources, and advisories.
  # Runs as a real gate on every push and pull request (no continue-on-error).
  # Known-unfixable transitive advisories are waived explicitly in deny.toml.
  audit:
    name: Supply-chain Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-deny (pinned)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.20.2

      - name: Run cargo-deny (all sections)
        run: cargo deny check

  # Institutionalizes the #24/#26 decision (decision B): the WASM bundle is
  # built on demand from source, not committed. This job proves a pristine
  # checkout can build the WASM and the Obsidian plugin end to end. It is
  # deliberately independent (no `needs:`) so the clean-checkout path is a
  # standalone gate, and carries no `continue-on-error` — it must be a real gate.
  plugin:
    name: Plugin (WASM build + ESM tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned MSRV toolchain
        uses: dtolnay/rust-toolchain@1.87.0

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack (pinned)
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: plugins/obsidian-ee/package-lock.json

      - name: Build WASM from source
        run: ./scripts/build-wasm.sh

      - name: Install plugin deps
        working-directory: plugins/obsidian-ee
        run: npm ci

      - name: Run plugin test suite
        working-directory: plugins/obsidian-ee
        run: npm test

      - name: Type-check plugin
        working-directory: plugins/obsidian-ee
        run: npx tsc --noEmit

      - name: Build plugin bundle
        working-directory: plugins/obsidian-ee
        run: npm run build
