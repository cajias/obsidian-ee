# Local development environment.
#
# The relay is the only service: it is a zero-knowledge, in-memory router and
# currently has no external dependencies. (The offline queue is in-memory; a
# DynamoDB-backed implementation is planned behind a Cargo feature, at which
# point a pinned localstack service can be reintroduced.)
#
# No top-level `version:` key: this uses the current Compose Specification.

services:
  relay:
    build:
      context: ..
      dockerfile: docker/Dockerfile.relay
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      # To require client authentication, set a token here or in a .env file:
      # - RELAY_AUTH_TOKEN=change-me
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8080"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    # NOTE: `deploy.resources.limits` is a Docker Swarm field and is NOT
    # enforced by `docker compose` by default. To apply these limits locally,
    # run with `docker compose --compatibility up`.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
